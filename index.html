    /* Cyberpunk glitch effect */
    .glitch-text {
      position: relative;
      animation: glitch 2s infinite;
    }
    
    .glitch-text:before,
    .glitch-text:after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    
    .glitch-text:before {
      animation: glitch-1 0.5s infinite;
      color: #ff0040;
      z-index: -1;
    }
    
    .glitch-text:after {
      animation: glitch-2 0.5s infinite;
      color: #00ffff;
      z-index: -2;
    }
    
    @keyframes glitch {
      0%, 74%, 76%, 100% {
        transform: translate(0);
      }
      75% {
        transform: translate(-2px, 2px);
      }
    }
    
    @keyframes glitch-1 {
      0%, 74%, 76%, 100% {
        transform: translate(0);
      }
      75% {
        transform: translate(2px, -2px);
      }
    }
    
    @keyframes glitch-2 {
      0%, 74%, 76%, 100% {
        transform: translate(0);
      }
      75% {
        transform: translate(-2px, -2px);
      }
    }
  </style>
