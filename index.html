<!DOCTYPE html>
<html lang="en" class="scroll-pt-16 scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyberpunk DevOps Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Cyberpunk scrollbar */
    body {
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
    }
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #0a0f18;
    }
    ::-webkit-scrollbar-thumb {
      background: #0891b2; /* Tailwind cyan-600 */
      border-radius: 4px;
      border: 1px solid #0a0f18;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #06b6d4; /* Tailwind cyan-500 */
    }

    /* Cyberpunk glitch effect */
    .glitch-text {
      position: relative;
      animation: glitch 2s infinite;
    }
    
    .glitch-text:before,
    .glitch-text:after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    
    .glitch-text:before {
      animation: glitch-1 0.5s infinite;
      color: #ff0040;
      z-index: -1;
    }
    
    .glitch-text:after {
      animation: glitch-2 0.5s infinite;
      color: #00ffff;
      z-index: -2;
    }
    
    @keyframes glitch {
      0%, 74%, 76%, 100% {
        transform: translate(0);
      }
      75% {
        transform: translate(-2px, 2px);
      }
    }
    
    @keyframes glitch-1 {
      0%, 74%, 76%, 100% {
        transform: translate(0);
      }
      75% {
        transform: translate(2px, -2px);
      }
    }
    
    @keyframes glitch-2 {
      0%, 74%, 76%, 100% {
        transform: translate(0);
      }
      75% {
        transform: translate(-2px, -2px);
      }
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "react/": "https://esm.sh/react@18.2.0/",
    "react-tsparticles": "https://cdn.jsdelivr.net/npm/react-tsparticles@2.12.2/+esm",
    "tsparticles-slim": "https://cdn.jsdelivr.net/npm/tsparticles-slim@2.12.2/+esm",
    "tsparticles-engine": "https://cdn.jsdelivr.net/npm/tsparticles-engine@2.12.0/+esm",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-[#0a0f18] text-gray-100 font-sans leading-normal tracking-normal">

</html>
